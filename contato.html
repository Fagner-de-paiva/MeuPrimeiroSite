    <!-- formulário na página de contato com campos de Nome e 
email-->
        <form><h1>Entre em contato conosco: </h1>
            <div class="formulario">
            <div>
                <label>
                    Nome: <br> <input placeholder="Digite seu nome..." type="text">
                </label><br>
            </div>
            <div>
                <label>
                    Email: <br><input placeholder="Digite seu Email..." type="email">
                </label><br>
            </div>
            <div>
                <label>
                    Telefone: <br><input placeholder="(xx) xxxxx-xxxx" type="tel">
                </label>
            </div>
            <div>
                <label>
                    Mensagem: <br><input style="height: 50px;" placeholder="Escreva sua mensagem..." type="text">
                </label>
            </div>

            <!-- Input submit-->
            <input style="margin: 20px;" type="submit">
        </div>
        </form>
        

    

<footer><!--footer comum a todas as pags e com redes sociais e copyrigths-->
